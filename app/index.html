  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

    /* Morph blob */

    /* Grad text */
    .grad-text{-webkit-background-clip:text!important;background-clip:text!important;-webkit-text-fill-color:transparent}

    /* Glass cards */
    .card{position:relative;overflow:hidden;border-radius:20px;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,border-color .3s}

    .light .card{background:rgba(255,255,255,.55);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);border:1px solid rgba(255,255,255,.5);box-shadow:0 1px 3px rgba(0,0,0,.04),inset 0 1px 0 rgba(255,255,255,.6)}
    .light .card:hover{box-shadow:0 12px 40px -12px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.6);border-color:rgba(255,255,255,.7)}
    .dark .card{background:rgba(255,255,255,.03);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .dark .card:hover{box-shadow:0 12px 40px -12px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}

    .card:hover::after{opacity:1}

    /* Ring */
    .ring-draw{transition:stroke-dashoffset 1.8s cubic-bezier(.16,1,.3,1)}

    /* Breathe ring */
    @keyframes breathe{0%,100%{opacity:.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:.6;transform:translate(-50%,-50%) scale(1.04)}}
    .breathe{animation:breathe 4s ease-in-out infinite}

    /* Animations */
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
    @keyframes checkBounce{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
    .fu{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both}
    .fi{animation:fadeIn .5s ease both}
    .si{animation:scaleIn .4s cubic-bezier(.16,1,.3,1) both}
    .sli{animation:slideIn .5s cubic-bezier(.16,1,.3,1) both}

    .toggle-k{transition:left .25s cubic-bezier(.68,-.55,.27,1.55)}

    .hcell{transition:all .15s ease}.hcell:hover{transform:scale(1.3);z-index:10}

    /* Ambient */
    @keyframes orbF1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(100px,-80px) scale(1.15)}66%{transform:translate(-50px,60px) scale(.9)}}
    @keyframes orbF2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-80px,70px) scale(1.1)}}
    @keyframes orbF3{0%,100%{transform:translate(0,0)}33%{transform:translate(60px,80px)}66%{transform:translate(-30px,-40px)}}
    .orb1{animation:orbF1 18s ease-in-out infinite}.orb2{animation:orbF2 14s ease-in-out infinite}.orb3{animation:orbF3 20s ease-in-out infinite}

    .part{position:absolute;border-radius:50%;pointer-events:none;animation:partUp linear infinite}

    /* Aurora border */
    @keyframes auRot{to{transform:rotate(360deg)}}
    .aurora{position:relative}
    .aurora::before{content:'';position:absolute;inset:-1.5px;border-radius:inherit;padding:1.5px;background:conic-gradient(#3b82f640,#8b5cf640,#ec489940,#10b98140,#3b82f640);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:auRot 8s linear infinite}

    .cmdk-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-start;justify-content:center;padding-top:min(20vh,160px)}

  </style>
</head>

// ── Time ──
function getTP(){
  var n=new Date(),y=n.getFullYear(),m=n.getMonth(),d=n.getDate();
  var sy=new Date(y,0,1),ey=new Date(y+1,0,1),yP=((n-sy)/(ey-sy))*100;
  var sm=new Date(y,m,1),em=new Date(y,m+1,1),mP=((n-sm)/(em-sm))*100;
  var dw=n.getDay(),sw=new Date(n);sw.setDate(d-((dw+6)%7));sw.setHours(0,0,0,0);
  var ew=new Date(sw);ew.setDate(sw.getDate()+7);var wP=((n-sw)/(ew-sw))*100;
  var sd=new Date(y,m,d),ed=new Date(y,m,d+1),dP=((n-sd)/(ed-sd))*100;
  var ws=new Date(y,m,d,9),we=new Date(y,m,d,18);
  var wdP=n<ws?0:n>we?100:((n-ws)/(we-ws))*100;
  var wdR=n<we&&n>=ws?Math.ceil((we-n)/6e4):n<ws?540:0;
  return{yP:yP,mP:mP,wP:wP,dP:dP,wdP:wdP,wdR:wdR,now:n};
}

function greet(hr,name){
  var g=hr<5?"Late night":hr<12?"Good morning":hr<17?"Good afternoon":hr<21?"Good evening":"Night mode";
  return name?g+", "+name:g;
}
function getEmphasis(hr,tp){
  if(hr<5)return"Rest well. Tomorrow is a new canvas.";
  if(hr<9)return"Plan your day. "+Math.round(100-tp.dP)+"% of today is ahead.";
  if(hr<12)return"Deep work window. Protect it.";
  if(hr<14)return"Midday reset. Refuel and refocus.";
  if(hr<17)return"Afternoon push. Ship before sunset.";
  if(hr<19)return"Wrapping up. What did you accomplish?";
  if(hr<21)return"Evening review. "+Math.round(tp.dP)+"% of today is done.";
  return"Wind down. Tomorrow starts fresh.";
}

function accent(hr){
  if(hr<5||hr>=21)return{c:"#a78bfa",g:"linear-gradient(135deg,#a78bfa,#818cf8)"};
  if(hr<10)return{c:"#fbbf24",g:"linear-gradient(135deg,#fbbf24,#f59e0b)"};
  if(hr<14)return{c:"#60a5fa",g:"linear-gradient(135deg,#60a5fa,#3b82f6)"};
  if(hr<18)return{c:"#34d399",g:"linear-gradient(135deg,#34d399,#10b981)"};

}
