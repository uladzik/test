<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes growBar {
      from { width: 0%; }
    }
    .anim-fade-up {
      animation: fadeUp 0.5s ease-out both;
    }
    .anim-fade-in {
      animation: fadeIn 0.5s ease-out both;
    }
    .anim-scale-in {
      animation: scaleIn 0.3s ease-out both;
    }
    .anim-bar {
      animation: growBar 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }
    .delay-bar { animation-delay: 0.4s; }

    .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .focus-glow { box-shadow: 0 0 40px rgba(59, 130, 246, 0.15); }
    .dark .focus-glow { box-shadow: 0 0 40px rgba(96, 165, 250, 0.1); }

    .toggle-knob {
      transition: left 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    .collapse-section {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s ease;
    }
    .collapse-section.open {
      grid-template-rows: 1fr;
    }
    .collapse-inner {
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Icons ──
    const Icons = {
      Sun: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
      Moon: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
      Plus: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Target: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
      Clock: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Zap: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      Trash: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
    };

    // ── Time helpers ──
    function getTimeProgress() {
      const now = new Date();
      const year = now.getFullYear();

      const startOfYear = new Date(year, 0, 1);
      const endOfYear = new Date(year + 1, 0, 1);
      const yearProgress = ((now - startOfYear) / (endOfYear - startOfYear)) * 100;

      const startOfMonth = new Date(year, now.getMonth(), 1);
      const endOfMonth = new Date(year, now.getMonth() + 1, 1);
      const monthProgress = ((now - startOfMonth) / (endOfMonth - startOfMonth)) * 100;

      const dayOfWeek = now.getDay();
      const startOfWeek = new Date(now);
      startOfWeek.setDate(now.getDate() - ((dayOfWeek + 6) % 7));
      startOfWeek.setHours(0, 0, 0, 0);
      const endOfWeek = new Date(startOfWeek);
      endOfWeek.setDate(startOfWeek.getDate() + 7);
      const weekProgress = ((now - startOfWeek) / (endOfWeek - startOfWeek)) * 100;

      const startOfDay = new Date(year, now.getMonth(), now.getDate());
      const endOfDay = new Date(year, now.getMonth(), now.getDate() + 1);
      const dayProgress = ((now - startOfDay) / (endOfDay - startOfDay)) * 100;

      const workStart = new Date(year, now.getMonth(), now.getDate(), 9, 0, 0);
      const workEnd = new Date(year, now.getMonth(), now.getDate(), 18, 0, 0);
      let workdayProgress = 0;
      if (now < workStart) workdayProgress = 0;
      else if (now > workEnd) workdayProgress = 100;
      else workdayProgress = ((now - workStart) / (workEnd - workStart)) * 100;

      const workdayRemaining = now < workEnd && now >= workStart
        ? Math.ceil((workEnd - now) / (1000 * 60))
        : now < workStart ? Math.ceil((workEnd - workStart) / (1000 * 60)) : 0;

      return { yearProgress, monthProgress, weekProgress, dayProgress, workdayProgress, workdayRemaining, now };
    }

    function getMotivation(type, pct) {
      const p = Math.round(pct);
      const tips = {
        Year: p < 25 ? "Fresh start energy. Set ambitious Q1 targets."
            : p < 50 ? "Almost halfway. Double down on what's working."
            : p < 75 ? `Year is ${p}% through. Time to review your next quarter goals.`
            : "Final stretch. Focus on finishing strong.",
        Month: p < 30 ? "Beginning of month. Plan your key deliverables."
             : p < 60 ? "Mid-month check: are you on track?"
             : p < 85 ? "Month is winding down. Prioritize what matters most."
             : "Last days of the month. Close out open loops.",
        Week: p < 30 ? "Week is young. Set your top 3 priorities."
            : p < 60 ? "Midweek momentum. Stay focused on deep work."
            : p < 80 ? "Wrap up key tasks before the week ends."
            : "Weekend is close. Tie up loose ends.",
        Day: p < 25 ? "Morning advantage. Tackle the hardest task first."
           : p < 50 ? "Stay in flow. Protect the next 2 hours."
           : p < 75 ? "Afternoon push. One more big win is possible."
           : "Wind down intentionally. Review what you accomplished.",
      };
      return tips[type] || "";
    }

    const barColors = {
      Year:  { gradient: "linear-gradient(to right, #3b82f6, #6366f1)", track: "bg-blue-100 dark:bg-blue-500/10" },
      Month: { gradient: "linear-gradient(to right, #10b981, #14b8a6)", track: "bg-emerald-100 dark:bg-emerald-500/10" },
      Week:  { gradient: "linear-gradient(to right, #f59e0b, #f97316)", track: "bg-amber-100 dark:bg-amber-500/10" },
      Day:   { gradient: "linear-gradient(to right, #f43f5e, #ec4899)", track: "bg-rose-100 dark:bg-rose-500/10" },
    };

    // ── Components ──

    function ProgressBar({ label, percentage, delay }) {
      const colors = barColors[label];
      return (
        <div className={`anim-fade-up group ${delay}`}>
          <div className="flex items-baseline justify-between mb-2">
            <span className="text-sm font-medium text-gray-700 dark:text-gray-300 tracking-wide uppercase">
              {label}
            </span>
            <span className="text-2xl font-semibold tabular-nums text-gray-900 dark:text-white">
              {percentage.toFixed(1)}
              <span className="text-sm font-normal text-gray-400 dark:text-gray-500 ml-0.5">%</span>
            </span>
          </div>
          <div className={`h-2 rounded-full overflow-hidden ${colors.track} mb-2`}>
            <div
              className="h-full rounded-full anim-bar delay-bar"
              style={{
                width: `${Math.min(percentage, 100)}%`,
                background: colors.gradient,
              }}
            />
          </div>
          <p className="text-xs text-gray-400 dark:text-gray-500 leading-relaxed h-0 overflow-hidden opacity-0 group-hover:h-auto group-hover:opacity-100 transition-all duration-300">
            {getMotivation(label, percentage)}
          </p>
        </div>
      );
    }

    function FocusMode({ workdayProgress, workdayRemaining, active, onToggle }) {
      const hours = Math.floor(workdayRemaining / 60);
      const mins = workdayRemaining % 60;

      return (
        <div className={`anim-fade-up delay-5 rounded-2xl p-6 transition-all duration-500 ${
          active
            ? "glass bg-blue-50/60 dark:bg-blue-950/30 border border-blue-200/50 dark:border-blue-500/20 focus-glow"
            : "bg-white/60 dark:bg-white/[0.04] border border-gray-200/60 dark:border-white/[0.06]"
        }`}>
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2.5">
              <div className={`p-2 rounded-xl ${active ? "bg-blue-500/10" : "bg-gray-100 dark:bg-white/[0.06]"}`}>
                <Icons.Zap className={active ? "text-blue-500" : "text-gray-400"} />
              </div>
              <div>
                <h3 className="text-sm font-semibold text-gray-900 dark:text-white">Focus Mode</h3>
                <p className="text-xs text-gray-400 dark:text-gray-500">Workday 9 AM – 6 PM</p>
              </div>
            </div>
            <button
              onClick={onToggle}
              className={`relative w-12 h-7 rounded-full transition-colors duration-300 ${
                active ? "bg-blue-500" : "bg-gray-200 dark:bg-white/10"
              }`}
            >
              <div
                className="toggle-knob absolute top-1 w-5 h-5 rounded-full bg-white shadow-sm"
                style={{ left: active ? "calc(100% - 24px)" : "4px" }}
              />
            </button>
          </div>

          <div className={`collapse-section ${active ? "open" : ""}`}>
            <div className="collapse-inner">
              <div className="h-1.5 rounded-full overflow-hidden bg-blue-100 dark:bg-blue-900/30 mb-3">
                <div
                  className="h-full rounded-full transition-all duration-1000 ease-out"
                  style={{
                    width: `${workdayProgress}%`,
                    background: "linear-gradient(to right, #3b82f6, #60a5fa)",
                  }}
                />
              </div>
              <div className="flex items-center justify-between pb-1">
                <span className="text-xs text-gray-500 dark:text-gray-400">
                  {workdayProgress >= 100
                    ? "Workday complete. You've earned your rest."
                    : workdayProgress <= 0
                    ? "Workday hasn't started yet."
                    : `${hours}h ${mins}m remaining`
                  }
                </span>
                <span className="text-xs font-medium text-blue-500">
                  {workdayProgress.toFixed(0)}%
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MilestoneCard({ milestone, onDelete }) {
      const now = new Date();
      const target = new Date(milestone.date + "T00:00:00");
      const diffMs = target - now;
      const isPast = diffMs < 0;
      const absDiff = Math.abs(diffMs);
      const days = Math.floor(absDiff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((absDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

      return (
        <div className="anim-scale-in flex items-center justify-between p-4 rounded-xl bg-white/60 dark:bg-white/[0.04] border border-gray-200/60 dark:border-white/[0.06] group">
          <div className="flex items-center gap-3 min-w-0">
            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${isPast ? "bg-gray-300 dark:bg-gray-600" : "bg-emerald-500"}`} />
            <div className="min-w-0">
              <p className="text-sm font-medium text-gray-900 dark:text-white truncate">{milestone.name}</p>
              <p className="text-xs text-gray-400 dark:text-gray-500">
                {target.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
              </p>
            </div>
          </div>
          <div className="flex items-center gap-3 flex-shrink-0">
            <div className="text-right">
              <p className={`text-lg font-semibold tabular-nums ${isPast ? "text-gray-400" : "text-gray-900 dark:text-white"}`}>
                {isPast ? "-" : ""}{days}
                <span className="text-xs font-normal text-gray-400 ml-0.5">d</span>
                {" "}{hours}
                <span className="text-xs font-normal text-gray-400 ml-0.5">h</span>
              </p>
              <p className="text-[10px] text-gray-400 uppercase tracking-wider">
                {isPast ? "ago" : "remaining"}
              </p>
            </div>
            <button
              onClick={() => onDelete(milestone.id)}
              className="p-1.5 rounded-lg opacity-0 group-hover:opacity-100 hover:bg-red-50 dark:hover:bg-red-500/10 text-gray-300 hover:text-red-500 transition-all"
            >
              <Icons.Trash />
            </button>
          </div>
        </div>
      );
    }

    function AddMilestoneForm({ onAdd, onCancel }) {
      const [name, setName] = useState("");
      const [date, setDate] = useState("");
      const inputRef = useRef(null);

      useEffect(() => { inputRef.current?.focus(); }, []);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (name.trim() && date) {
          onAdd({ id: Date.now(), name: name.trim(), date });
          setName("");
          setDate("");
        }
      };

      return (
        <form
          onSubmit={handleSubmit}
          className="anim-scale-in space-y-3 p-4 rounded-xl bg-white/60 dark:bg-white/[0.04] border border-gray-200/60 dark:border-white/[0.06]"
        >
          <input
            ref={inputRef}
            type="text"
            placeholder="Milestone name"
            value={name}
            onChange={(e) => setName(e.target.value)}
            className="w-full px-3 py-2.5 text-sm rounded-lg bg-gray-50 dark:bg-white/[0.06] border border-gray-200 dark:border-white/[0.08] text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500/50 transition"
          />
          <input
            type="date"
            value={date}
            onChange={(e) => setDate(e.target.value)}
            className="w-full px-3 py-2.5 text-sm rounded-lg bg-gray-50 dark:bg-white/[0.06] border border-gray-200 dark:border-white/[0.08] text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500/50 transition"
          />
          <div className="flex gap-2">
            <button
              type="submit"
              className="flex-1 px-3 py-2.5 text-sm font-medium rounded-lg bg-gray-900 dark:bg-white text-white dark:text-gray-900 hover:bg-gray-800 dark:hover:bg-gray-100 transition"
            >
              Add Milestone
            </button>
            <button
              type="button"
              onClick={onCancel}
              className="px-3 py-2.5 text-sm rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-white/[0.06] transition"
            >
              Cancel
            </button>
          </div>
        </form>
      );
    }

    // ── App ──
    function App() {
      const [dark, setDark] = useState(() => window.matchMedia("(prefers-color-scheme: dark)").matches);
      const [time, setTime] = useState(getTimeProgress);
      const [focusMode, setFocusMode] = useState(false);
      const [showForm, setShowForm] = useState(false);
      const [milestones, setMilestones] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem("momentum_milestones"));
          if (saved && saved.length) return saved;
        } catch {}
        return [
          { id: 1, name: "Q2 Review", date: "2026-06-30" },
          { id: 2, name: "Product Launch", date: "2026-09-15" },
        ];
      });

      useEffect(() => {
        const id = setInterval(() => setTime(getTimeProgress()), 1000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
      }, [dark]);

      useEffect(() => {
        localStorage.setItem("momentum_milestones", JSON.stringify(milestones));
      }, [milestones]);

      const addMilestone = useCallback((m) => {
        setMilestones(prev => [...prev, m].sort((a, b) => new Date(a.date) - new Date(b.date)));
        setShowForm(false);
      }, []);

      const deleteMilestone = useCallback((id) => {
        setMilestones(prev => prev.filter(m => m.id !== id));
      }, []);

      const dateStr = time.now.toLocaleDateString("en-US", {
        weekday: "long", month: "long", day: "numeric"
      });

      const timeStr = time.now.toLocaleTimeString("en-US", {
        hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
      });

      return (
        <div className="min-h-screen bg-gray-50 dark:bg-[#0a0a0a] text-gray-900 dark:text-white transition-colors duration-500">
          {/* Ambient gradients */}
          <div className="fixed inset-0 pointer-events-none overflow-hidden">
            <div className="absolute -top-1/2 -right-1/4 w-[800px] h-[800px] rounded-full bg-gradient-to-br from-blue-500/[0.04] to-purple-500/[0.04] dark:from-blue-500/[0.02] dark:to-purple-500/[0.02] blur-3xl" />
            <div className="absolute -bottom-1/2 -left-1/4 w-[600px] h-[600px] rounded-full bg-gradient-to-br from-emerald-500/[0.04] to-teal-500/[0.04] dark:from-emerald-500/[0.02] dark:to-teal-500/[0.02] blur-3xl" />
          </div>

          <div className="relative max-w-xl mx-auto px-5 py-12 md:py-20">
            {/* Header */}
            <header className="anim-fade-up flex items-start justify-between mb-12">
              <div>
                <h1 className="text-3xl font-bold tracking-tight text-gray-900 dark:text-white mb-1">
                  Momentum
                </h1>
                <p className="text-sm text-gray-400 dark:text-gray-500">{dateStr}</p>
                <p className="text-xs text-gray-300 dark:text-gray-600 tabular-nums mt-0.5">{timeStr}</p>
              </div>
              <button
                onClick={() => setDark(!dark)}
                className="p-2.5 rounded-xl bg-white/60 dark:bg-white/[0.04] border border-gray-200/60 dark:border-white/[0.06] hover:bg-gray-100 dark:hover:bg-white/[0.08] text-gray-600 dark:text-gray-400 transition-all"
                aria-label="Toggle theme"
              >
                {dark ? <Icons.Sun /> : <Icons.Moon />}
              </button>
            </header>

            {/* Time Progress */}
            <section className="mb-10">
              <div className="flex items-center gap-2 mb-6 anim-fade-up delay-1">
                <Icons.Clock className="text-gray-400" />
                <h2 className="text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500">
                  Time Progress
                </h2>
              </div>
              <div className="space-y-6">
                <ProgressBar label="Year" percentage={time.yearProgress} delay="delay-1" />
                <ProgressBar label="Month" percentage={time.monthProgress} delay="delay-2" />
                <ProgressBar label="Week" percentage={time.weekProgress} delay="delay-3" />
                <ProgressBar label="Day" percentage={time.dayProgress} delay="delay-4" />
              </div>
            </section>

            {/* Focus Mode */}
            <section className="mb-10">
              <FocusMode
                workdayProgress={time.workdayProgress}
                workdayRemaining={time.workdayRemaining}
                active={focusMode}
                onToggle={() => setFocusMode(!focusMode)}
              />
            </section>

            {/* Milestones */}
            <section className="anim-fade-up delay-6">
              <div className="flex items-center justify-between mb-5">
                <div className="flex items-center gap-2">
                  <Icons.Target className="text-gray-400" />
                  <h2 className="text-xs font-semibold uppercase tracking-widest text-gray-400 dark:text-gray-500">
                    Milestones
                  </h2>
                </div>
                {!showForm && (
                  <button
                    onClick={() => setShowForm(true)}
                    className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/[0.06] transition-all"
                  >
                    <Icons.Plus /> Add
                  </button>
                )}
              </div>
              <div className="space-y-2">
                {showForm && (
                  <AddMilestoneForm onAdd={addMilestone} onCancel={() => setShowForm(false)} />
                )}
                {milestones.map((m) => (
                  <MilestoneCard key={m.id} milestone={m} onDelete={deleteMilestone} />
                ))}
                {milestones.length === 0 && !showForm && (
                  <p className="text-center py-8 text-sm text-gray-300 dark:text-gray-600">
                    No milestones yet. Add one to start tracking.
                  </p>
                )}
              </div>
            </section>

            {/* Footer */}
            <footer className="anim-fade-in mt-16 text-center" style={{ animationDelay: "1s" }}>
              <p className="text-[11px] text-gray-300 dark:text-gray-700 tracking-wide">
                Make every moment count.
              </p>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
