// ═══════════════════════════════════════
// SOUND - Web Audio API notification
// ═══════════════════════════════════════
function playNotificationSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.5);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.5);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════
// TIME HELPERS
// ═══════════════════════════════════════
function getTimeProgress() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
  const startOfYear = new Date(y,0,1), endOfYear = new Date(y+1,0,1);
  const yearProgress = ((now-startOfYear)/(endOfYear-startOfYear))*100;
  const startOfMonth = new Date(y,m,1), endOfMonth = new Date(y,m+1,1);
  const monthProgress = ((now-startOfMonth)/(endOfMonth-startOfMonth))*100;
  const dow = now.getDay();
  const startOfWeek = new Date(now); startOfWeek.setDate(d-((dow+6)%7)); startOfWeek.setHours(0,0,0,0);
  const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate()+7);
  const weekProgress = ((now-startOfWeek)/(endOfWeek-startOfWeek))*100;
  const startOfDay = new Date(y,m,d), endOfDay = new Date(y,m,d+1);
  const dayProgress = ((now-startOfDay)/(endOfDay-startOfDay))*100;
  const ws = new Date(y,m,d,9,0,0), we = new Date(y,m,d,18,0,0);
  let workdayProgress = now<ws?0:now>we?100:((now-ws)/(we-ws))*100;
  const workdayRemaining = now<we&&now>=ws?Math.ceil((we-now)/60000):now<ws?540:0;
  return { yearProgress, monthProgress, weekProgress, dayProgress, workdayProgress, workdayRemaining, now };
}

// ═══════════════════════════════════════
// ANIMATED NUMBER
// ═══════════════════════════════════════
function AnimatedNumber({ value, decimals = 1, suffix = "", className = "" }) {
  const [display, setDisplay] = useState(0);
  const prevRef = useRef(0);
  const rafRef = useRef(null);

  useEffect(() => {
    const start = prevRef.current;
    const end = value;
    const duration = 800;
    const startTime = performance.now();
    const step = (t) => {
      const elapsed = t - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
      setDisplay(start + (end - start) * eased);
      if (progress < 1) rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    prevRef.current = end;
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [value]);

  return <span className={className}>{display.toFixed(decimals)}{suffix}</span>;
}

// ═══════════════════════════════════════
// PROGRESS RING
// ═══════════════════════════════════════
function ProgressRing({ size, percentage, colors, label, index }) {
  const sw = 4.5;
  const r = (size - sw) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (Math.min(percentage, 100) / 100) * circ;
  const c = size / 2;
  const id = `g-${label}`;
  const [mounted, setMounted] = useState(false);
  useEffect(() => { const t = setTimeout(() => setMounted(true), 100 + index * 150); return () => clearTimeout(t); }, []);

  return (
    <div className="absolute" style={{ width:size, height:size, top:'50%', left:'50%', transform:'translate(-50%,-50%)' }}>
      <svg width={size} height={size}>
        <defs>
          <linearGradient id={id} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={colors[0]} />
            <stop offset="100%" stopColor={colors[1]} />
          </linearGradient>
        </defs>
        <circle cx={c} cy={c} r={r} fill="none" stroke="currentColor"
          className="text-gray-100 dark:text-white/[0.05]" strokeWidth={sw} />
        <circle cx={c} cy={c} r={r} fill="none" stroke={`url(#${id})`}
          strokeWidth={sw} strokeLinecap="round"
          strokeDasharray={circ}
          strokeDashoffset={mounted ? offset : circ}
          className="ring-draw"
          style={{ transform:'rotate(-90deg)', transformOrigin:'center' }} />
      </svg>
    </div>
  );
}

// ═══════════════════════════════════════
// TILT CARD
// ═══════════════════════════════════════
function TiltCard({ children, className = "", style = {} }) {
  const ref = useRef(null);
  const handleMove = useCallback((e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(800px) rotateX(${y*-5}deg) rotateY(${x*5}deg) scale3d(1.008,1.008,1.008)`;
  }, []);
  const handleLeave = useCallback(() => {
    if (ref.current) ref.current.style.transform = '';
  }, []);
  return <div ref={ref} className={`tilt-card ${className}`} style={style} onMouseMove={handleMove} onMouseLeave={handleLeave}>{children}</div>;
}

// ═══════════════════════════════════════
function PomodoroTimer() {
  const WORK=25*60, BREAK=5*60;
  const [seconds,setSeconds] = useState(WORK);
  const [running,setRunning] = useState(false);
  const [isBreak,setIsBreak] = useState(false);
  const [sessions,setSessions] = useState(() => {
    try { return parseInt(localStorage.getItem("m_pomo"))||0; } catch{return 0;}
  });

  useEffect(() => {
    if(!running) return;
    const id = setInterval(() => {
      setSeconds(s => {
        if(s<=1) {
          setRunning(false);
          playNotificationSound();
          if(!isBreak) {
            const n = sessions+1;
            setSessions(n);
            localStorage.setItem("m_pomo",n);
            setIsBreak(true);
            return BREAK;
          } else { setIsBreak(false); return WORK; }
        }
        return s-1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running, isBreak, sessions]);

  const reset = () => { setRunning(false); setIsBreak(false); setSeconds(WORK); };
  const mins = Math.floor(seconds/60), secs = seconds%60;
  const total = isBreak?BREAK:WORK, pct = ((total-seconds)/total)*100;
  const r = 34, circ = 2*Math.PI*r, dashOff = circ-(pct/100)*circ;
  const color = isBreak?"#10b981":"#ef4444";

  return (
    <div className="flex items-center gap-4">
      <div className={`relative ${running && !isBreak ? "pomo-active" : ""}`} style={{ borderRadius: '50%' }}>
        <svg width="80" height="80">
          <circle cx="40" cy="40" r={r} fill="none" stroke="currentColor" className="text-gray-100 dark:text-white/[0.06]" strokeWidth="3.5" />
          <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={dashOff}
            style={{ transform:'rotate(-90deg)', transformOrigin:'center', transition:'stroke-dashoffset 1s linear' }} />
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <span className="text-base font-bold tabular-nums text-gray-900 dark:text-white">
            {String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}
          </span>
          <span className="text-[8px] uppercase tracking-widest mt-0.5" style={{ color }}>{isBreak?"Break":"Focus"}</span>
        </div>
      </div>
      <div className="space-y-2">
        <div className="flex gap-1.5">
          <button onClick={() => setRunning(!running)}
            className={`p-2 rounded-lg transition-all ${running?"bg-gray-900 dark:bg-white text-white dark:text-gray-900":"bg-gray-100 dark:bg-white/[0.06] text-gray-500 hover:bg-gray-200 dark:hover:bg-white/10"}`}>
            {running ? <I.Pause /> : <I.Play />}
          </button>
          <button onClick={reset}
            className="p-2 rounded-lg bg-gray-100 dark:bg-white/[0.06] text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-200 dark:hover:bg-white/10 transition-all">
            <I.RotateCcw />
          </button>
        </div>
        <div className="flex items-center gap-1 text-[11px] text-gray-400">
          <I.Flame className="text-orange-400" />
          <span className="tabular-nums font-medium">{sessions}</span>
          <span>sessions today</span>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// HABIT TRACKER WITH 7-DAY HEATMAP
// ═══════════════════════════════════════
function HabitTracker() {
  const [habits, setHabits] = useState(() => {
    try { return JSON.parse(localStorage.getItem("m_habits")) || [
      { id:1, name:"Exercise", history:{} },
      { id:2, name:"Read 30min", history:{} },
      { id:3, name:"No social media", history:{} },
    ]; } catch { return []; }
  });
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");
  const inputRef = useRef(null);

  useEffect(() => { localStorage.setItem("m_habits", JSON.stringify(habits)); }, [habits]);
  useEffect(() => { if (adding) inputRef.current?.focus(); }, [adding]);

  const today = new Date().toISOString().slice(0,10);
  const last7 = useMemo(() => {
    const days = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      days.push({ key: d.toISOString().slice(0,10), label: d.toLocaleDateString("en-US",{weekday:"narrow"}) });
    }
    return days;
  }, [today]);

  const toggleHabit = (id, dateKey) => {
    setHabits(prev => prev.map(h => {
      if (h.id !== id) return h;
      const hist = { ...h.history };
      hist[dateKey] = !hist[dateKey];
      return { ...h, history: hist };
    }));
  };

  const getStreak = (habit) => {
    let streak = 0;
    const d = new Date();
    while (true) {
      const key = d.toISOString().slice(0,10);
      if (habit.history[key]) { streak++; d.setDate(d.getDate()-1); }
      else break;
    }
    return streak;
  };

  const addHabit = (e) => {
    e.preventDefault();
    if (newName.trim()) {
      setHabits(prev => [...prev, { id: Date.now(), name: newName.trim(), history: {} }]);
      setNewName(""); setAdding(false);
    }
  };

  return (
    <div className="space-y-1">
      {/* Header row with day labels */}
      <div className="flex items-center mb-2">
        <div className="flex-1" />
        <div className="flex gap-1 mr-8">
          {last7.map(d => (
            <div key={d.key} className="w-6 text-center text-[9px] font-medium text-gray-300 dark:text-gray-600 uppercase">{d.label}</div>
          ))}
        </div>
      </div>

      {habits.map(h => {
        const streak = getStreak(h);
        const checkedToday = h.history[today];
        return (
          <div key={h.id} className="flex items-center py-1.5 group">
            <div className="flex-1 min-w-0 flex items-center gap-2">
              <span className={`text-sm truncate ${checkedToday ? "text-gray-400 dark:text-gray-500" : "text-gray-700 dark:text-gray-300"}`}>{h.name}</span>
              {streak >= 2 && (
                <span className="flex items-center gap-0.5 text-[10px] font-semibold text-orange-500 flex-shrink-0">
                  <I.Flame />{streak}
                </span>
              )}
            </div>
            <div className="flex gap-1 items-center">
              {last7.map(d => {
                const done = h.history[d.key];
                const isToday = d.key === today;
                return (
                  <button key={d.key} onClick={() => toggleHabit(h.id, d.key)}
                    className={`heat-cell w-6 h-6 rounded-md flex items-center justify-center transition-all ${
                      done
                        ? "bg-emerald-500 text-white"
                        : isToday
                        ? "bg-gray-100 dark:bg-white/[0.08] border-2 border-dashed border-gray-300 dark:border-gray-600"
                        : "bg-gray-50 dark:bg-white/[0.03]"
                    }`}>
                    {done && <I.Check />}
                  </button>
                );
              })}
            </div>
            <button onClick={() => setHabits(prev => prev.filter(x => x.id !== h.id))}
              className="ml-2 p-1 rounded opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all">
              <I.Trash />
            </button>
          </div>
        );
      })}

      {adding ? (
        <form onSubmit={addHabit} className="flex gap-2 pt-2">
          <input ref={inputRef} type="text" value={newName} onChange={e => setNewName(e.target.value)}
            placeholder="New habit" className="flex-1 px-3 py-1.5 text-sm rounded-lg bg-gray-50 dark:bg-white/[0.06] border border-gray-200 dark:border-white/[0.08] text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 transition" />
          <button type="submit" className="px-3 py-1.5 text-sm font-medium rounded-lg bg-gray-900 dark:bg-white text-white dark:text-gray-900">Add</button>
          <button type="button" onClick={() => setAdding(false)} className="px-2 text-sm text-gray-400">Cancel</button>
        </form>
      ) : (
        <button onClick={() => setAdding(true)} className="flex items-center gap-1.5 text-[11px] text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition pt-2">
          <I.Plus /> Add habit
        </button>
      )}
    </div>
  );
}

// MILESTONE CARD
// ═══════════════════════════════════════
function MilestoneCard({ milestone, onDelete }) {
  const now = new Date();
  const target = new Date(milestone.date+"T00:00:00");
  const diffMs = target-now;
  const isPast = diffMs<0;
  const abs = Math.abs(diffMs);
  const days = Math.floor(abs/864e5);
  const hours = Math.floor((abs%864e5)/36e5);
  const totalDays = milestone.totalDays || days;
  const progressPct = isPast ? 100 : Math.max(0, Math.min(100, ((totalDays - days) / totalDays) * 100));

  return (
    <TiltCard>
      <div className="anim-scale-in p-4 rounded-xl glass-card group">
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-center gap-2.5 min-w-0">
            <div className={`w-2 h-2 rounded-full flex-shrink-0 ${isPast?"bg-gray-300 dark:bg-gray-600":"bg-emerald-500"}`} />
            <div className="min-w-0">
              <p className="text-sm font-medium text-gray-900 dark:text-white truncate">{milestone.name}</p>
              <p className="text-[11px] text-gray-400 dark:text-gray-500">
                {target.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
              </p>
            </div>
          </div>
          <div className="flex items-center gap-2.5 flex-shrink-0">
            <div className="text-right">
              <p className={`text-lg font-bold tabular-nums ${isPast?"text-gray-400":"text-gray-900 dark:text-white"}`}>
                {isPast?"-":""}{days}<span className="text-[10px] font-normal text-gray-400 ml-0.5">d</span>
                {" "}{hours}<span className="text-[10px] font-normal text-gray-400 ml-0.5">h</span>
              </p>
            </div>
            <button onClick={() => onDelete(milestone.id)}
              className="p-1 rounded-lg opacity-0 group-hover:opacity-100 hover:bg-red-50 dark:hover:bg-red-500/10 text-gray-300 hover:text-red-500 transition-all">
              <I.Trash />
            </button>
          </div>
        </div>
        {/* Mini progress bar */}
        {!isPast && (
          <div className="h-1 rounded-full bg-gray-100 dark:bg-white/[0.06] overflow-hidden">
            <div className="h-full rounded-full bg-gradient-to-r from-emerald-500 to-teal-400 transition-all duration-1000"
              style={{ width: `${progressPct}%` }} />
          </div>
        )}
      </div>
    </TiltCard>
  );
}

function Particles({ color }) {
  const particles = useMemo(() =>
    Array.from({ length: 30 }, (_, i) => ({
      id: i,
      left: Math.random() * 100,
      size: Math.random() * 3 + 1,
      duration: Math.random() * 8 + 6,
      delay: Math.random() * 5,
      opacity: Math.random() * 0.4 + 0.1,
    })), []);

  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none">
      {particles.map(p => (
        <div key={p.id} className="particle"
          style={{
            left: `${p.left}%`, bottom: '-10px',
            width: p.size, height: p.size,
            background: color, opacity: p.opacity,
            animationDuration: `${p.duration}s`,
            animationDelay: `${p.delay}s`,
          }} />
      ))}
    </div>
  );
}

            </button>
            <button onClick={() => setDark(!dark)} title="Theme (D)"
              className="p-2.5 rounded-xl glass-card hover:bg-gray-100 dark:hover:bg-white/[0.08] text-gray-500 dark:text-gray-400 transition-all">
              {dark ? <I.Sun /> : <I.Moon />}
            </button>
          </div>
        </header>

        {/* ── TIME PROGRESS ── */}
        <section className="mb-10">
          <SectionHeader icon={I.Clock} label="Time Progress" delay="d1" />
          <TiltCard className="aurora-border rounded-2xl p-7 glass-card anim-fade-up d2">
            <div className="flex flex-col sm:flex-row items-center gap-8">
              {/* Rings */}
              <div className="relative w-44 h-44 flex-shrink-0 ring-container">
                {RINGS.map((ring,i) => (
                  <ProgressRing key={ring.label} size={ring.size} percentage={time[ring.key]} colors={ring.colors} label={ring.label} index={i} />
                ))}
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="text-center">
                    <AnimatedNumber value={time.dayProgress} decimals={0}
                      className="text-2xl font-bold tabular-nums text-gray-900 dark:text-white" />
                    <span className="text-xs text-gray-400 ml-0.5">%</span>
                    <p className="text-[8px] uppercase tracking-[0.2em] text-gray-400 mt-0.5">today</p>
                  </div>
                </div>
              </div>

              {/* Labels */}
              <div className="flex-1 space-y-3.5 w-full">
                {RINGS.map((ring, i) => (
                  <div key={ring.label} className="group anim-fade-up" style={{ animationDelay:`${0.3+i*0.08}s` }}>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2.5">
                        <div className="w-2 h-2 rounded-full transition-transform group-hover:scale-150" style={{ background:ring.colors[0] }} />
                        <span className="text-sm text-gray-600 dark:text-gray-400">{ring.label}</span>
                      </div>
                      <AnimatedNumber value={time[ring.key]} decimals={1} suffix="%"
                        className="text-sm font-semibold tabular-nums text-gray-900 dark:text-white" />
                    </div>
                    <div className="overflow-hidden max-h-0 group-hover:max-h-12 transition-all duration-300 ease-out">
                      <p className="text-[11px] text-gray-400 dark:text-gray-600 mt-1 pl-[18px] leading-relaxed">
                        {getMotivation(ring.label, time[ring.key])}
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </TiltCard>
        </section>

        {/* ── FOCUS MODE ── */}
        <section className="mb-10 anim-fade-up d4">
          <SectionHeader icon={I.Zap} label="Focus" delay="d3" />
          <FocusSection
            workdayProgress={time.workdayProgress}
            workdayRemaining={time.workdayRemaining}
            active={focusMode}
            onToggle={() => setFocusMode(!focusMode)}
          />
        </section>

        {/* ── HABITS ── */}
        <section className="mb-10 anim-fade-up d5">
          <SectionHeader icon={I.Flame} label="Daily Habits" delay="d5" />
          <TiltCard className="rounded-2xl p-5 glass-card">
            <HabitTracker />
          </TiltCard>
        </section>

        {/* ── MILESTONES ── */}
        <section className="anim-fade-up d6">
          <SectionHeader icon={I.Target} label="Milestones" delay="d6">
            {!showForm && (
              <button onClick={() => setShowForm(true)}
                className="flex items-center gap-1 px-2.5 py-1 text-[11px] font-medium rounded-lg text-gray-500 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/[0.06] transition-all">
                <I.Plus /> Add
              </button>
            )}
          </SectionHeader>
          <div className="space-y-2">
            {showForm && <AddMilestoneForm onAdd={addMilestone} onCancel={() => setShowForm(false)} />}
            {milestones.map(m => <MilestoneCard key={m.id} milestone={m} onDelete={deleteMilestone} />)}
            {milestones.length===0 && !showForm && (
              <p className="text-center py-8 text-sm text-gray-300 dark:text-gray-600">No milestones yet.</p>
            )}
          </div>
        </section>

        {/* ── FOOTER ── */}
        <footer className="anim-fade-in mt-16 space-y-3 text-center" style={{ animationDelay:"1.2s" }}>
          <div className="flex items-center justify-center gap-4 text-[10px] text-gray-300 dark:text-gray-700">
            <span><span className="kbd border-gray-200 dark:border-gray-800">D</span> theme</span>
            <span><span className="kbd border-gray-200 dark:border-gray-800">F</span> focus</span>
            <span><span className="kbd border-gray-200 dark:border-gray-800">A</span> ambient</span>
          </div>
          <p className="text-[11px] text-gray-300 dark:text-gray-700 tracking-wide font-light">Make every moment count.</p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
